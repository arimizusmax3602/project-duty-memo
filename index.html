<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>プロジェクト当番メモ</title>
  <style>
    :root{--navy:#17324d;--blue:#2267a7;--sky:#eaf4fb;--mint:#dbf3eb;--orange:#f39a43;--red:#cf4e4e;--ink:#183044;--muted:#687c8c;--line:#d9e3ea;--bg:#f4f7f9;--white:#fff;--shadow:0 8px 28px #17324d16}
    *{box-sizing:border-box}body{margin:0;font-family:"Yu Gothic UI","Noto Sans JP",sans-serif;background:var(--bg);color:var(--ink)}button,input,select,textarea{font:inherit}button{cursor:pointer}.hidden{display:none!important}
    .login{min-height:100vh;display:grid;place-items:center;padding:24px;background:radial-gradient(circle at 20% 15%,#d9eef9,transparent 32%),linear-gradient(145deg,#f7fafc,#edf3f6)}
    .login-card{width:min(700px,100%);background:#fff;border-radius:24px;padding:42px;box-shadow:var(--shadow);text-align:center}.mark{width:62px;height:62px;border-radius:18px;margin:auto;background:var(--navy);color:#fff;display:grid;place-items:center;font-size:30px}.login h1{margin:18px 0 6px;font-size:30px}.login p{margin:0 0 30px;color:var(--muted)}.shift-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}.shift-btn{border:1px solid var(--line);background:#fff;border-radius:17px;padding:24px 10px;color:var(--ink);transition:.15s}.shift-btn:hover{transform:translateY(-2px);border-color:var(--blue);box-shadow:0 8px 20px #2267a722}.shift-btn b{display:block;font-size:20px;margin-top:8px}.shift-btn span{font-size:28px}
    header{height:72px;background:var(--navy);color:#fff;display:flex;align-items:center;padding:0 28px;gap:18px;position:sticky;top:0;z-index:10}.brand{font-weight:800;font-size:19px;white-space:nowrap}.shift-pill{background:#ffffff20;border:1px solid #ffffff30;border-radius:99px;padding:7px 12px;font-size:13px}.datebox{margin-left:auto;display:flex;align-items:center;gap:8px}.datebox input{border:0;border-radius:9px;padding:8px 10px}.ghost{border:1px solid #ffffff55;color:#fff;background:transparent;border-radius:9px;padding:8px 12px}.layout{display:grid;grid-template-columns:220px 1fr;min-height:calc(100vh - 72px)}nav{background:#fff;border-right:1px solid var(--line);padding:22px 14px}.navbtn{width:100%;border:0;background:none;padding:13px 16px;border-radius:11px;text-align:left;color:var(--muted);margin-bottom:5px}.navbtn.active{background:var(--sky);color:var(--blue);font-weight:700}main{padding:28px;max-width:1240px;width:100%;margin:auto}.page-head{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:20px}.page-head h2{margin:0 0 4px;font-size:26px}.sub{color:var(--muted);font-size:14px;margin:0}.btn{border:0;border-radius:10px;padding:10px 16px;font-weight:700;background:var(--blue);color:#fff}.btn.secondary{background:#fff;color:var(--blue);border:1px solid #b8d0e4}.btn.danger{background:#fff;color:var(--red);border:1px solid #e8bbbb}.btn.small{padding:7px 11px;font-size:13px}
    .next-card{background:linear-gradient(135deg,var(--navy),#28577e);color:#fff;border-radius:20px;padding:25px;display:grid;grid-template-columns:1fr auto;align-items:center;box-shadow:var(--shadow);margin-bottom:18px}.eyebrow{opacity:.7;font-size:12px;letter-spacing:.12em}.next-name{font-size:38px;font-weight:800;margin:6px 0}.next-info{opacity:.8}.next-actions{display:grid;gap:9px;min-width:180px}.next-card .btn{background:#fff;color:var(--navy);font-size:16px;padding:14px 22px}.next-card .btn.record-now{background:var(--orange);color:#fff}.next-card .btn:disabled{opacity:.45;cursor:not-allowed}
    .card{background:#fff;border:1px solid var(--line);border-radius:16px;padding:20px;box-shadow:0 4px 16px #17324d09;margin-bottom:18px}.card h3{margin:0 0 16px}.order-list{display:grid;gap:9px}.order-row{display:grid;grid-template-columns:42px 1fr auto;align-items:center;padding:13px;border:1px solid var(--line);border-radius:12px}.order-row.current{border:2px solid var(--blue);background:var(--sky)}.order-num{width:29px;height:29px;border-radius:50%;display:grid;place-items:center;background:#edf1f4;font-weight:700}.current .order-num{background:var(--blue);color:#fff}.row-actions{display:flex;gap:6px}.iconbtn{border:1px solid var(--line);background:#fff;border-radius:8px;padding:5px 9px}.empty{text-align:center;color:var(--muted);padding:34px 10px}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}.stat{background:#fff;border:1px solid var(--line);border-radius:14px;padding:16px}.stat b{font-size:27px;display:block}.stat span{color:var(--muted);font-size:13px}
    .compact-order{display:flex;gap:8px;align-items:center;overflow:auto;padding-bottom:3px}.order-chip{flex:0 0 auto;border:1px solid var(--line);border-radius:99px;padding:8px 12px;background:#fff;font-size:13px}.order-chip.current{background:var(--navy);color:#fff;border-color:var(--navy);font-weight:700}.arrow{color:#91a0aa}.record{display:grid;grid-template-columns:76px 1.2fr 1fr 1fr auto;gap:12px;align-items:center;border-top:1px solid var(--line);padding:14px 0}.record:first-child{border-top:0}.badge{display:inline-block;border-radius:99px;padding:4px 9px;font-size:12px;background:var(--mint);color:#18634f}.badge.transfer{background:#fff0df;color:#995411}.muted{color:var(--muted);font-size:13px}.link{color:var(--blue);text-decoration:none}.form-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}.field{display:grid;gap:6px}.field.full{grid-column:1/-1}.field label{font-size:13px;font-weight:700}.field input,.field select,.field textarea{width:100%;border:1px solid #bdcbd5;border-radius:9px;padding:10px;background:#fff}.field textarea{min-height:80px;resize:vertical}.dialog{border:0;border-radius:18px;padding:0;width:min(650px,calc(100% - 24px));box-shadow:0 20px 70px #0004}.dialog::backdrop{background:#10283b99}.dialog-head{display:flex;justify-content:space-between;padding:20px;border-bottom:1px solid var(--line)}.dialog-head h3{margin:0}.dialog-body{padding:20px}.dialog-foot{padding:16px 20px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:8px}.close{border:0;background:none;font-size:24px}
    .check-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}.notice{border-left:4px solid var(--orange);background:#fff8ef;padding:12px 14px;border-radius:8px;font-size:13px}.issue{border:1px solid var(--line);border-left:4px solid var(--red);border-radius:10px;padding:13px;margin-top:10px}.ok{border-left-color:#33a278}.toolbar{display:flex;gap:8px;flex-wrap:wrap}.recent{display:flex;gap:7px;overflow:auto;margin:0 0 18px}.recent button{border:1px solid var(--line);background:#fff;border-radius:99px;padding:6px 11px;white-space:nowrap}
    @media(max-width:800px){header{padding:0 14px}.brand{display:none}.layout{grid-template-columns:1fr}nav{position:fixed;bottom:0;left:0;right:0;z-index:20;display:grid;grid-template-columns:repeat(4,1fr);padding:7px;border:0;border-top:1px solid var(--line)}.navbtn{text-align:center;padding:9px 4px;font-size:12px;margin:0}main{padding:18px 14px 85px}.shift-grid{grid-template-columns:1fr}.login-card{padding:28px 20px}.stats{grid-template-columns:repeat(2,1fr)}.next-card{grid-template-columns:1fr;gap:18px}.next-actions{grid-template-columns:1fr 1fr;min-width:0}.next-name{font-size:32px}.record{grid-template-columns:60px 1fr auto}.record .rec-sub{grid-column:2/4}.check-grid,.form-grid{grid-template-columns:1fr}.field.full{grid-column:auto}.datebox .ghost{display:none}}
  </style>
</head>
<body>
  <section id="login" class="login"><div class="login-card"><div class="mark">☎</div><h1>プロジェクト当番メモ</h1><p>今日の当番を選択して開始してください</p><div class="shift-grid"><button class="shift-btn" data-shift="朝"><span>☀</span><b>朝当番</b></button><button class="shift-btn" data-shift="夜"><span>☾</span><b>夜当番</b></button><button class="shift-btn" data-shift="土曜"><span>▣</span><b>土曜日当番</b></button></div></div></section>
  <section id="app" class="hidden"><header><div class="brand">☎ プロジェクト当番メモ</div><span id="shiftPill" class="shift-pill"></span><div class="datebox"><button id="todayBtn" class="ghost">今日</button><input id="dateInput" type="date"><button id="logoutBtn" class="ghost">当番切替</button></div></header><div class="layout"><nav><button class="navbtn active" data-page="order">順番</button><button class="navbtn" data-page="records">記録</button><button class="navbtn" data-page="check">突合チェック</button><button class="navbtn" data-page="settings">設定</button></nav><main id="main"></main></div></section>
  <dialog id="memberDialog" class="dialog"><form method="dialog"><div class="dialog-head"><h3>メンバー編集</h3><button class="close" value="cancel">×</button></div><div class="dialog-body"><div class="field"><label>メンバー名</label><div style="display:flex;gap:8px"><input id="memberName" placeholder="例：山田"><button id="addMemberBtn" type="button" class="btn">追加</button></div></div><div id="memberEditList" class="order-list" style="margin-top:18px"></div></div></form></dialog>
  <dialog id="recordDialog" class="dialog"><form id="recordForm"><div class="dialog-head"><h3 id="recordDialogTitle">電話を記録</h3><button type="button" class="close" data-close>×</button></div><div class="dialog-body form-grid"><input id="recordId" type="hidden"><div class="field"><label>電話受付日時</label><input id="receivedAt" type="datetime-local" required></div><div class="field"><label>病院名</label><input id="hospital" required placeholder="例：〇〇病院"></div><div class="field"><label>受電担当</label><select id="assignee" required></select></div><div class="field"><label>対応区分</label><select id="responseType"><option value="自己対応">自己対応</option><option value="取次">取次</option></select></div><div id="transferField" class="field hidden"><label>取次先</label><input id="transferTo" list="transferOptions" placeholder="部署名・担当者名"><datalist id="transferOptions"></datalist></div><div class="field"><label>プリザンターリンク</label><input id="pleasanterUrl" type="url" placeholder="https://.../items/12345"></div><div class="field full"><label>メモ</label><textarea id="memo" placeholder="用件・対応内容"></textarea></div><div class="field full"><label><input id="advanceOrder" type="checkbox" checked style="width:auto"> 保存後、電話順を次へ進める</label></div></div><div class="dialog-foot"><button type="button" class="btn secondary" data-close>キャンセル</button><button class="btn" type="submit">保存</button></div></form></dialog>
<script>
const KEY='project-duty-memo-v1';
const $=s=>document.querySelector(s), $$=s=>[...document.querySelectorAll(s)];
const today=()=>{const d=new Date();return [d.getFullYear(),String(d.getMonth()+1).padStart(2,'0'),String(d.getDate()).padStart(2,'0')].join('-')};
let db=JSON.parse(localStorage.getItem(KEY)||'{"sessions":{},"settings":{"tolerance":5}}'), shift='', date=today(), page='order';
const save=()=>localStorage.setItem(KEY,JSON.stringify(db));
const key=()=>`${date}|${shift}`;
function session(){return db.sessions[key()] ||= {members:[],pointer:0,records:[],pleasanter:[]}}
function esc(v=''){return String(v).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function localDT(d=new Date()){const z=n=>String(n).padStart(2,'0');return `${d.getFullYear()}-${z(d.getMonth()+1)}-${z(d.getDate())}T${z(d.getHours())}:${z(d.getMinutes())}`}
function enter(s){shift=s;date=today();$('#dateInput').value=date;$('#shiftPill').textContent=s+'当番';$('#login').classList.add('hidden');$('#app').classList.remove('hidden');page='order';render()}
$$('.shift-btn').forEach(b=>b.onclick=()=>enter(b.dataset.shift));
$('#logoutBtn').onclick=()=>{$('#app').classList.add('hidden');$('#login').classList.remove('hidden')};
$('#todayBtn').onclick=()=>{date=today();$('#dateInput').value=date;render()};
$('#dateInput').onchange=e=>{date=e.target.value;render()};
$$('.navbtn').forEach(b=>b.onclick=()=>{page=b.dataset.page;render()});
function render(){ $$('.navbtn').forEach(b=>b.classList.toggle('active',b.dataset.page===page)); ({order:renderOrder,records:renderRecords,check:renderCheck,settings:renderSettings}[page])() }
function recentHtml(){const ds=[...new Set(Object.keys(db.sessions).filter(k=>k.endsWith('|'+shift)).map(k=>k.split('|')[0]))].sort().reverse().slice(0,7);return ds.length?`<div class="recent"><span class="muted" style="padding:7px">最近:</span>${ds.map(d=>`<button data-date="${d}">${d.slice(5).replace('-','/')}</button>`).join('')}</div>`:''}
function bindRecent(){$$('[data-date]').forEach(b=>b.onclick=()=>{date=b.dataset.date;$('#dateInput').value=date;render()})}
function orderRows(edit=false){const s=session();if(!s.members.length)return '<div class="empty">メンバーがまだ登録されていません</div>';return `<div class="order-list">${s.members.map((m,i)=>{const rs=s.records.filter(r=>r.assignee===m);return `<div class="order-row ${i===s.pointer?'current':''}"><span class="order-num">${i+1}</span><div><b>${esc(m)}</b><div class="muted">対応 ${rs.length}件・取次 ${rs.filter(r=>r.type==='取次').length}件</div></div>${edit?`<div class="row-actions"><button class="iconbtn" data-move="${i},-1">↑</button><button class="iconbtn" data-move="${i},1">↓</button><button class="iconbtn" data-remove="${i}">削除</button></div>`:(i===s.pointer?'<span class="badge">次の担当</span>':'')}</div>`}).join('')}</div>`}
function renderOrder(){const s=session(), current=s.members[s.pointer];$('#main').innerHTML=`${recentHtml()}<div class="page-head"><div><h2>${date.replaceAll('-','/')} ${shift}当番</h2><p class="sub">この画面から電話記録と順番操作ができます</p></div><button id="editMembers" class="btn secondary">メンバーを編集</button></div><section class="next-card"><div><div class="eyebrow">NEXT CALL</div><div class="next-name">${current?esc(current):'未登録'}</div><div class="next-info">${current?`${s.pointer+1} / ${s.members.length}　その次：${esc(s.members[(s.pointer+1)%s.members.length])}`:'メンバーを登録してください'}</div></div><div class="next-actions"><button id="recordNowBtn" class="btn record-now">＋ 電話を記録</button><button id="advanceBtn" class="btn" ${current?'':'disabled'}>次の担当へ →</button></div></section><div class="stats"><div class="stat"><b>${s.records.length}</b><span>本日の受電</span></div><div class="stat"><b>${s.records.filter(r=>r.type==='取次').length}</b><span>取次</span></div><div class="stat"><b>${s.members.length}</b><span>当番メンバー</span></div><div class="stat"><b>${issues().length}</b><span>要確認</span></div></div><section class="card"><h3>電話順</h3>${orderRows()}</section>`;bindRecent();$('#editMembers').onclick=openMembers;$('#recordNowBtn').onclick=()=>s.members.length?openRecord():openMembers();$('#advanceBtn').onclick=advance}
function advance(){const s=session();if(s.members.length){s.pointer=(s.pointer+1)%s.members.length;save();render()}}
function openMembers(){$('#memberName').value='';renderMemberEdit();$('#memberDialog').showModal()}
function renderMemberEdit(){$('#memberEditList').innerHTML=orderRows(true);$$('[data-remove]').forEach(b=>b.onclick=()=>{const s=session();s.members.splice(+b.dataset.remove,1);s.pointer=Math.min(s.pointer,Math.max(0,s.members.length-1));save();renderMemberEdit()});$$('[data-move]').forEach(b=>b.onclick=()=>{let [i,d]=b.dataset.move.split(',').map(Number),s=session(),j=i+d;if(j<0||j>=s.members.length)return;[s.members[i],s.members[j]]=[s.members[j],s.members[i]];save();renderMemberEdit()})}
$('#addMemberBtn').onclick=()=>{const n=$('#memberName').value.trim();if(n&&!session().members.includes(n)){session().members.push(n);save();$('#memberName').value='';renderMemberEdit()}};
$('#memberDialog').addEventListener('close',render);
function compactOrder(){const s=session();return s.members.length?`<div class="compact-order">${s.members.map((m,i)=>`${i?'<span class="arrow">›</span>':''}<span class="order-chip ${i===s.pointer?'current':''}">${i+1}. ${esc(m)}${i===s.pointer?'（次）':''}</span>`).join('')}</div>`:'<div class="empty">順番タブからメンバーを登録してください</div>'}
function renderRecords(){const s=session();$('#main').innerHTML=`${recentHtml()}<div class="page-head"><div><h2>電話記録</h2><p class="sub">${date.replaceAll('-','/')} ${shift}当番</p></div><button id="newRecord" class="btn">＋ 電話を記録</button></div><section class="card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:13px"><h3 style="margin:0">電話順</h3><button id="quickAdvance" class="btn secondary small">次の担当へ</button></div>${compactOrder()}</section><section class="card"><h3>受電一覧（${s.records.length}件）</h3><div>${s.records.length?s.records.slice().sort((a,b)=>b.receivedAt.localeCompare(a.receivedAt)).map(r=>`<div class="record"><b>${r.receivedAt.slice(11,16)}</b><div><b>${esc(r.hospital)}</b><div class="muted">${esc(r.memo||'メモなし')}</div></div><div class="rec-sub"><span class="badge ${r.type==='取次'?'transfer':''}">${esc(r.type)}</span>　${esc(r.assignee)}${r.type==='取次'?` → ${esc(r.transferTo)}`:''}</div><div class="rec-sub">${r.url?`<a class="link" href="${esc(r.url)}" target="_blank">プリザンターを開く ↗</a>`:'<span class="muted">リンク未登録</span>'}</div><div class="row-actions"><button class="iconbtn" data-edit-record="${r.id}">編集</button><button class="iconbtn" data-delete-record="${r.id}">削除</button></div></div>`).join(''):'<div class="empty">電話記録はまだありません</div>'}</div></section>`;bindRecent();$('#newRecord').onclick=()=>openRecord();$('#quickAdvance').onclick=advance;$$('[data-edit-record]').forEach(b=>b.onclick=()=>openRecord(b.dataset.editRecord));$$('[data-delete-record]').forEach(b=>b.onclick=()=>{if(confirm('この記録を削除しますか？')){session().records=session().records.filter(r=>r.id!==b.dataset.deleteRecord);save();render()}})}
function openRecord(id){const s=session(),r=s.records.find(x=>x.id===id);$('#recordDialogTitle').textContent=r?'電話記録を編集':'電話を記録';$('#recordId').value=r?.id||'';$('#receivedAt').value=r?.receivedAt||localDT();$('#hospital').value=r?.hospital||'';$('#assignee').innerHTML=s.members.map(m=>`<option>${esc(m)}</option>`).join('');$('#assignee').value=r?.assignee||s.members[s.pointer]||'';$('#responseType').value=r?.type||'自己対応';$('#transferTo').value=r?.transferTo||'';$('#pleasanterUrl').value=r?.url||'';$('#memo').value=r?.memo||'';$('#advanceOrder').checked=!r;$('#transferOptions').innerHTML=['開発部','システム技術部','サポート',...s.members].map(x=>`<option value="${esc(x)}">`).join('');toggleTransfer();$('#recordDialog').showModal()}
function toggleTransfer(){$('#transferField').classList.toggle('hidden',$('#responseType').value!=='取次')}
$('#responseType').onchange=toggleTransfer;$$('[data-close]').forEach(b=>b.onclick=()=>$('#recordDialog').close());
$('#recordForm').onsubmit=e=>{e.preventDefault();const s=session(),id=$('#recordId').value,r={id:id||crypto.randomUUID(),receivedAt:$('#receivedAt').value,hospital:$('#hospital').value.trim(),assignee:$('#assignee').value,type:$('#responseType').value,transferTo:$('#transferTo').value.trim(),url:$('#pleasanterUrl').value.trim(),memo:$('#memo').value.trim()};if(id)s.records[s.records.findIndex(x=>x.id===id)]=r;else s.records.push(r);if(!id&&$('#advanceOrder').checked&&s.members.length)s.pointer=(s.pointer+1)%s.members.length;save();$('#recordDialog').close();render()};
function pId(url){const m=(url||'').match(/(?:items\/|\/)(\d+)(?:[/?#]|$)/);return m?.[1]||''}
function issues(){const s=session(),tol=+(db.settings.tolerance||5);return s.records.map(r=>{if(!r.url)return {...r,status:'リンク無し'};const id=pId(r.url),p=s.pleasanter.find(x=>String(x.id)===id);if(!p)return {...r,status:'P該当なし'};const diff=Math.abs(new Date(r.receivedAt)-new Date(p.receivedAt))/60000;if(diff>tol)return {...r,status:'日時差異',diff:Math.round(diff),pTime:p.receivedAt};return null}).filter(Boolean)}
function parseCSV(text){const lines=text.trim().split(/\r?\n/);if(lines.length<2)return [];const split=l=>l.split(/,|\t/).map(x=>x.trim().replace(/^"|"$/g,'')),h=split(lines[0]),idI=h.findIndex(x=>/^(id|resultid)$/i.test(x)||x.includes('ID')),dtI=h.findIndex(x=>x.includes('受付')||/date/i.test(x));return lines.slice(1).map(split).filter(x=>x[idI]&&x[dtI]).map(x=>({id:x[idI],receivedAt:x[dtI].replace(' ','T')}))}
function renderCheck(){const list=issues(),s=session();$('#main').innerHTML=`<div class="page-head"><div><h2>プリザンター突合チェック</h2><p class="sub">リンク漏れと受付日時の差異を抽出します</p></div></div><div class="stats"><div class="stat"><b>${s.records.filter(r=>!r.url).length}</b><span>リンク無し</span></div><div class="stat"><b>${list.filter(r=>r.status==='日時差異').length}</b><span>日時差異</span></div><div class="stat"><b>${list.filter(r=>r.status==='P該当なし').length}</b><span>P該当なし</span></div><div class="stat"><b>${Math.max(0,s.records.length-list.length)}</b><span>一致</span></div></div><div class="check-grid"><section class="card"><h3>プリザンターCSV貼り付け</h3><div class="notice">ID列と受付日時列を含むCSVまたはタブ区切りデータを貼り付けてください。</div><div class="field" style="margin-top:14px"><textarea id="csvInput" placeholder="ID,受付日時&#10;12345,2026-07-19 09:10"></textarea></div><button id="loadCsv" class="btn" style="margin-top:10px">読み込んで突合</button><div class="muted" style="margin-top:8px">読込済み: ${s.pleasanter.length}件</div></section><section class="card"><h3>要確認一覧（${list.length}件）</h3><div class="toolbar"><button id="copyNotice" class="btn secondary small">通知用にコピー</button><button id="exportCsv" class="btn secondary small">CSV出力</button></div><div>${list.length?list.map(r=>`<div class="issue"><b>${esc(r.status)}</b>　${esc(r.hospital)}<div class="muted">${r.receivedAt.replace('T',' ')} / ${esc(r.assignee)}${r.diff?` / ${r.diff}分差`:''}</div></div>`).join(''):'<div class="empty">要確認の記録はありません</div>'}</div></section></div>`;$('#loadCsv').onclick=()=>{s.pleasanter=parseCSV($('#csvInput').value);save();render()};$('#copyNotice').onclick=async()=>{const t=list.length?`【${date} ${shift}当番・要確認】\n`+list.map(r=>`・${r.status}: ${r.hospital}（${r.receivedAt.replace('T',' ')} / ${r.assignee}）`).join('\n'):`【${date} ${shift}当番】要確認なし`;await navigator.clipboard.writeText(t);alert('通知文をコピーしました')};$('#exportCsv').onclick=()=>download('突合チェック.csv','状態,病院名,受付日時,担当者,リンク\n'+list.map(r=>[r.status,r.hospital,r.receivedAt,r.assignee,r.url].map(x=>`"${String(x||'').replaceAll('"','""')}"`).join(',')).join('\n'))}
function download(name,text){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob(['\ufeff'+text],{type:'text/csv'}));a.download=name;a.click();URL.revokeObjectURL(a.href)}
function renderSettings(){$('#main').innerHTML=`<div class="page-head"><div><h2>設定</h2><p class="sub">突合条件とデータ管理</p></div></div><section class="card" style="max-width:650px"><h3>突合設定</h3><div class="field"><label>受付日時の許容差（分）</label><input id="tolerance" type="number" min="0" value="${db.settings.tolerance}"></div><button id="saveSettings" class="btn" style="margin-top:14px">設定を保存</button></section><section class="card" style="max-width:650px"><h3>データ</h3><p class="muted">この端末のブラウザ内に保存されています。バックアップをダウンロードできます。</p><div class="toolbar"><button id="backup" class="btn secondary">バックアップ</button><label class="btn secondary" style="cursor:pointer">復元<input id="restore" type="file" accept="application/json" hidden></label></div></section>`;$('#saveSettings').onclick=()=>{db.settings.tolerance=+$('#tolerance').value;save();alert('保存しました')};$('#backup').onclick=()=>download('当番メモ-backup.json',JSON.stringify(db,null,2));$('#restore').onchange=e=>{const f=e.target.files[0],r=new FileReader();r.onload=()=>{try{db=JSON.parse(r.result);save();render();alert('復元しました')}catch{alert('ファイルを読み込めませんでした')}};r.readAsText(f)}}
</script></body></html>
